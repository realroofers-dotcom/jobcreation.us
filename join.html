<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Join — JobCreation.us</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 20px; color: #16324f; line-height: 1.6; }
  h1 { font-size: 24px; }
  label { display: block; margin-top: 16px; font-size: 13px; color: #5c7385; }
  input, select { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #c7d6de; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
  .plans { display: flex; gap: 12px; margin-top: 8px; }
  .plan { flex: 1; border: 1px solid #c7d6de; border-radius: 4px; padding: 14px; cursor: pointer; text-align: center; }
  .plan.selected { border-color: #16324f; border-width: 2px; }
  .plan .price { font-size: 20px; font-weight: 700; }
  .pledge { background: #eaf0f2; border-radius: 4px; padding: 16px; margin-top: 20px; font-size: 14px; }
  .pledge label { display: flex; gap: 10px; align-items: flex-start; font-size: 14px; color: #16324f; margin-top: 10px; }
  .pledge input[type=checkbox] { width: auto; margin-top: 2px; }
  button { margin-top: 20px; padding: 12px 20px; background: #16324f; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; width: 100%; }
  button:hover { background: #b3502c; }
  .msg { margin-top: 16px; padding: 12px; border-radius: 4px; font-size: 14px; background: #fcebeb; color: #791f1f; }
</style>
</head>
<body>

<h1>Join JobCreation.us</h1>
<p>Membership supports training, hikes, and galas — self-funded, independently run.</p>

<label>Your name</label>
<input type="text" id="memberName">

<label>Your email</label>
<input type="email" id="memberEmail">

<label>Choose a plan</label>
<div class="plans">
  <div class="plan selected" data-plan="monthly" onclick="selectPlan('monthly')">
    <div class="price">$18</div>
    <div>per month</div>
  </div>
  <div class="plan" data-plan="annual" onclick="selectPlan('annual')">
    <div class="price">$190</div>
    <div>per year</div>
  </div>
</div>

<div class="pledge">
  <strong>The pledge</strong>
  <p id="pledgeText">By joining, I pledge to support the fight against homelessness and to uphold and defend free speech as core values of this community.</p>
  <label>
    <input type="checkbox" id="agree">
    I have read and agree to this pledge.
  </label>
</div>

<button onclick="join()">Continue to payment</button>
<div id="result"></div>

<script>
let selectedPlan = 'monthly';
function selectPlan(plan) {
  selectedPlan = plan;
  document.querySelectorAll('.plan').forEach(el => el.classList.toggle('selected', el.dataset.plan === plan));
}

async function join() {
  const resultEl = document.getElementById('result');
  resultEl.innerHTML = '';
  const memberName = document.getElementById('memberName').value.trim();
  const memberEmail = document.getElementById('memberEmail').value.trim();
  const agreedPledge = document.getElementById('agree').checked;
  const pledgeText = document.getElementById('pledgeText').textContent.trim();

  if (!memberName || !memberEmail) {
    resultEl.innerHTML = '<div class="msg">Enter your name and email.</div>';
    return;
  }
  if (!agreedPledge) {
    resultEl.innerHTML = '<div class="msg">You need to agree to the pledge to join.</div>';
    return;
  }

  try {
    const res = await fetch('/api/membership/join', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ memberName, memberEmail, plan: selectedPlan, agreedPledge, pledgeText }),
    });
    const data = await res.json();
    if (!res.ok) {
      resultEl.innerHTML = `<div class="msg">${data.error || 'Something went wrong.'}</div>`;
      return;
    }
    window.location.href = data.url;
  } catch (err) {
    resultEl.innerHTML = '<div class="msg">Network error - try again.</div>';
  }
}
</script>

</body>
</html>
