<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JobCreation.us — Journal admin</title>
<meta name="robots" content="noindex, nofollow" />
<style>
  body { font-family: -apple-system, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; color: #16324f; }
  h1 { font-size: 20px; }
  label { display: block; margin-top: 14px; font-size: 13px; color: #5c7385; }
  input, select, textarea { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #c7d6de; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
  button { margin-top: 20px; padding: 12px 20px; background: #16324f; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
  button:hover { background: #b3502c; }
  .msg { margin-top: 16px; padding: 12px; border-radius: 4px; font-size: 14px; }
  .msg.ok { background: #e1f5ee; color: #085041; }
  .msg.err { background: #fcebeb; color: #791f1f; }
  .row { display: flex; gap: 10px; }
  .row > div { flex: 1; }
  a.export { display: inline-block; margin-top: 30px; font-size: 14px; }
  #fmvRow { display: flex; }
  #serviceRow { display: none; }
  .hint { font-size: 12px; color: #5c7385; margin-top: 4px; }
</style>
</head>
<body>

<h1>Log a manual entry</h1>
<p style="font-size:13px;color:#5c7385;">For checks, cash, Venmo, or paid repair work — this immediately sends a receipt and records the journal entry.</p>

<label>Admin password</label>
<input type="password" id="password" placeholder="Enter password">

<div class="row">
  <div>
    <label>Donor / customer name</label>
    <input type="text" id="donorName">
  </div>
  <div>
    <label>Email</label>
    <input type="email" id="donorEmail">
  </div>
</div>

<div class="row">
  <div>
    <label>Amount ($)</label>
    <input type="number" id="amount" step="0.01">
  </div>
  <div>
    <label>Category</label>
    <select id="category" onchange="toggleFields()">
      <option value="donation">Donation</option>
      <option value="event_fee">Event fee (gala/hike/trip)</option>
      <option value="membership">Membership</option>
      <option value="service_revenue">Roofing repair / paid inspection (not tax-deductible)</option>
    </select>
  </div>
</div>

<div class="row" id="fmvRow">
  <div>
    <label>Fair market value of goods/services received ($, 0 if none)</label>
    <input type="number" id="fairMarketValue" step="0.01" value="0">
  </div>
  <div>
    <label>Method</label>
    <select id="method">
      <option value="check">Check</option>
      <option value="cash">Cash</option>
      <option value="venmo">Venmo</option>
      <option value="other">Other</option>
    </select>
  </div>
</div>

<div id="serviceRow">
  <label>Service description</label>
  <input type="text" id="serviceDescription" placeholder="e.g. Roof repair, 123 Main St - shingle replacement">
  <div class="hint">This is ordinary income, not a charitable gift — the receipt will say so, no EIN/deduction language.</div>
</div>

<label>Notes (optional)</label>
<textarea id="notes" rows="2"></textarea>

<button onclick="submitEntry()">Log entry and send receipt</button>
<div id="result"></div>

<a class="export" href="#" onclick="exportCsv(event)">Download full journal as CSV →</a>

<script>
function toggleFields() {
  const category = document.getElementById('category').value;
  const isService = category === 'service_revenue';
  document.getElementById('serviceRow').style.display = isService ? 'block' : 'none';
  document.getElementById('fmvRow').style.display = isService ? 'none' : 'flex';
}

async function submitEntry() {
  const password = document.getElementById('password').value;
  const body = {
    donorName: document.getElementById('donorName').value,
    donorEmail: document.getElementById('donorEmail').value,
    amount: document.getElementById('amount').value,
    category: document.getElementById('category').value,
    fairMarketValue: document.getElementById('fairMarketValue').value,
    method: document.getElementById('method').value,
    notes: document.getElementById('notes').value,
    serviceDescription: document.getElementById('serviceDescription').value,
  };
  const resultEl = document.getElementById('result');
  resultEl.innerHTML = '';
  try {
    const res = await fetch('/api/admin/log', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) {
      resultEl.innerHTML = `<div class="msg err">${data.error || 'Something went wrong'}</div>`;
      return;
    }
    resultEl.innerHTML = `<div class="msg ok">Logged. Receipt #${data.receiptNumber}${data.emailError ? ' — email failed to send, resend manually: ' + data.emailError : ' emailed.'}</div>`;
  } catch (err) {
    resultEl.innerHTML = `<div class="msg err">Network error — try again.</div>`;
  }
}

function exportCsv(e) {
  e.preventDefault();
  const password = document.getElementById('password').value;
  if (!password) { alert('Enter the admin password first.'); return; }
  window.location.href = '/api/admin/journal?format=csv&password=' + encodeURIComponent(password);
}
</script>

</body>
</html>
